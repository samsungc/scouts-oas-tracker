databases:
  - name: oas-tracker-db
    databaseName: scoutdb
    user: scouts
    plan: free

services:
  - type: web
    name: oas-tracker-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py createsuperuser --noinput || true
    startCommand: gunicorn OASTracker.wsgi:application --bind 0.0.0.0:$PORT
    plan: free
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: oas-tracker-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: MEDIA_ROOT
        value: /var/data/media
    disk:
      name: media
      mountPath: /var/data/media
      sizeGB: 10

  - type: web
    name: oas-tracker-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
